<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Client - Marketing Landing Page</title>
    <!-- 
        Notice that this page defines its own inline/internal CSS.
        It does not link to the global assets/style.css.
        This ensures complete isolation from the homepage design.
    -->
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #fce7f3;
            /* Different background to show isolation */
            color: #1f2937;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .hero {
            max-width: 600px;
            padding: 3rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .pill {
            display: inline-block;
            background: #fdf2f8;
            color: #db2777;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            border: 1px solid #fbcfe8;
        }

        h1 {
            color: #be185d;
            font-size: 3rem;
            margin: 0 0 1rem 0;
            line-height: 1.2;
        }

        p {
            font-size: 1.125rem;
            color: #4b5563;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        a.btn {
            display: inline-block;
            background: #be185d;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        a.btn:hover {
            background: #9d174d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(190, 24, 93, 0.3);
        }
    </style>
</head>

<body>
    <div class="hero">
        <span class="pill">ISOLATED DESIGN</span>
        <h1>Sample Campaign</h1>
        <p>This is a completely standalone sub-page with a completely different light pink theme. There is zero CSS
            leakage from the parent directory's dark theme.</p>
        <a href="../" class="btn">&larr; Back to Showcase</a>
    </div>
</body>

</html>
